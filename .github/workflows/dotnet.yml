name: Publish
on:
  push:
    branches:
      - main
    tags:
      - v**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    uses: tryAGI/workflows/.github/workflows/dotnet-sdk-build-test-publish.yml@main
    with:
      dotnet-version: 10.0.x
      project-path: src/libs/HeifSharp/HeifSharp.csproj
      run-tests: false
      enable-caching: false
    secrets:
      nuget-key: ${{ secrets.NUGET_API_KEY || secrets.NUGET_KEY }}

  tests:
    name: Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run tests
        run: dotnet test src/tests/HeifSharp.Tests/HeifSharp.Tests.csproj --configuration Release --nologo

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
