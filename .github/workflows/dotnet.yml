name: Publish
on:
  push:
    branches:
      - main
    tags:
      - v**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      NUGET_KEY: ${{ secrets.NUGET_API_KEY || secrets.NUGET_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build src/libs/HeifSharp/HeifSharp.csproj --configuration Release --nologo

      - name: Pack
        run: dotnet pack src/libs/HeifSharp/HeifSharp.csproj --configuration Release --no-build --output artifacts --nologo

      - name: Upload NuGet package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
          if-no-files-found: error

      - name: Publish to NuGet
        shell: bash
        run: |
          if [ -z "$NUGET_KEY" ]; then
            echo "No NuGet key configured. Skipping publish."
            exit 0
          fi

          for package in artifacts/*.nupkg; do
            dotnet nuget push "$package" \
              --skip-duplicate \
              --source https://api.nuget.org/v3/index.json \
              --api-key "$NUGET_KEY"
          done

  tests:
    name: Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run tests
        run: dotnet test src/tests/HeifSharp.Tests/HeifSharp.Tests.csproj --configuration Release --nologo

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Run Linux native smoke tests
        run: scripts/smoke-test-linux-native-assets.sh

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
